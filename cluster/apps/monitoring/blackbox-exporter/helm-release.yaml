---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 5.3.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 5m
  values:
    fullnameOverride: blackbox-exporter
    nameOverride: blackbox-exporter
    allowIcmp: true
    secretConfig: false
    config:
      modules:
        icmp:
          prober: icmp
          timeout: 30s
          icmp:
            preferred_ip_protocol: "ip4"
    serviceMonitor:
      enabled: true
      defaults:
        labels:
          release: prometheus
        interval: 30s
        scrapeTimeout: 30s
      targets:
        - name: dyson
          url: 192.168.1.216
          module: icmp
        - name: ios
          url: 192.168.1.122
          module: icmp
        - name: epson
          url: 192.168.1.122
          module: icmp
